name: Deploy Lab to GitHub Pages

# Builds the demo + lab (Vite multi-page) and publishes them to GitHub Pages so anyone
# can play with the effect in the browser. One-time setup: repo Settings -> Pages ->
# Source = "GitHub Actions".

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build demo + lab under the Pages subpath
        run: npm run demo:build
        env:
          CG_PAGES_BASE: /cracked-glass/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
